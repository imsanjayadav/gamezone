<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Play Zone | Playing...</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #FF6B6B;
      --secondary: #4ECDC4;
      --bg: #F7FFF7;
      --text: #2F3E46;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Fullscreen Game Area */
    .game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* Loading Overlay */
    .loader-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 50;
      transition: opacity 0.5s;
    }

    .loader-overlay i {
      font-size: 60px;
      margin-bottom: 20px;
      animation: spin 2s infinite linear;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Floating Back Button (Simplified for "No Header") */
    .floating-back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: var(--primary);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-decoration: none;
      font-size: 20px;
      border: 3px solid white;
    }
  </style>
</head>
<body>

  <a href="index.html" class="floating-back">
    <i class="fas fa-arrow-left"></i>
  </a>

  <div class="game-container">
    <div id="loader" class="loader-overlay">
      <i class="fas fa-gamepad"></i>
      <h2>Getting your game ready...</h2>
    </div>
    <iframe id="game-frame" src=""></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gameUrl = params.get('url');

    if (gameUrl) {
      document.getElementById('game-frame').src = gameUrl;
    }

    // Hide loader when game is ready
    document.getElementById('game-frame').onload = function() {
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loader').style.display = 'none';
        }, 500);
      }, 1000);
    };
  </script>
</body>
</html>
