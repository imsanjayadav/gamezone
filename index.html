<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Play Zone | Gaming Hub</title>
  <!-- Google Fonts: Fredoka for a rounded, playful feel -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #FF6B6B;
      /* Soft Red/Pink */
      --secondary: #4ECDC4;
      /* Turquoise */
      --accent: #FFE66D;
      /* Yellow */
      --bg: #F7FFF7;
      /* Off-white */
      --card-bg: #FFFFFF;
      --text: #2F3E46;
      --shadow: rgba(0, 0, 0, 0.1);
      --border-radius: 24px;
      --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Fredoka', sans-serif;
    }

    body {
      background: var(--bg);
      background: linear-gradient(135deg, #e0f7fa 0%, #f7fff7 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding-bottom: 80px;
      /* Space for bottom nav */
      overflow-x: hidden;
      position: relative;
    }

    /* Floating background shapes */
    .bg-bubble {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      filter: blur(20px);
      z-index: -1;
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      33% {
        transform: translate(30px, -50px) rotate(10deg);
      }

      66% {
        transform: translate(-20px, 20px) rotate(-5deg);
      }
    }

    /* Mobile-type container */
    .app-container {
      max-width: 440px;
      width: 100%;
      min-height: 100vh;
      background: transparent;
      position: relative;
      padding: 20px 16px;
    }

    /* Simplified Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background: white;
      padding: 12px 20px;
      border-radius: 30px;
      box-shadow: 0 8px 20px var(--shadow);
    }

    /* Soft 3D Toy Card Design */
    .game-card {
      background: white;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 15px 35px var(--shadow), 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 8px solid #fff;
      /* Sticker effect */
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 32px;
      background: #f0f0f0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
    }

    .game-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .game-card:hover .game-thumb img {
      transform: scale(1.1);
    }

    .game-info-row {
      display: flex;
      flex-direction: column;
      /* Stacked for a cleaner, bolder look */
      align-items: center;
      gap: 12px;
      padding: 0 8px 12px;
    }

    .game-card h4 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.5px;
    }

    .play-button-large {
      width: 100%;
      justify-content: center;
      background: var(--primary);
      color: white;
      padding: 14px 0;
      border-radius: 28px;
      font-weight: 800;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 0 #d63031;
      border: 2px solid rgba(255, 255, 255, 0.2);
      transition: all 0.1s;
    }

    .game-card:active .play-button-large {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #d63031;
    }

    /* Hide Search and Section Headers */
    .search-box,
    .section-header {
      display: none;
    }

    /* Categories tweaks */
    .categories {
      margin-bottom: 24px;
      padding: 10px 0;
    }

    .category-chip {
      font-size: 18px;
      padding: 12px 24px;
      border-radius: 25px;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: white;
      height: 70px;
      border-radius: 35px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      z-index: 100;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #bdc3c7;
      cursor: pointer;
      transition: var(--transition);
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .nav-item.active {
      color: var(--primary);
      transform: translateY(-8px);
    }

    .nav-item.active i {
      font-size: 24px;
    }

    .nav-item i {
      font-size: 20px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      display: none;
    }

    .nav-item.active .nav-label {
      display: block;
    }

    /* Animations */
    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .animate-bounce {
      animation: bounce 2s infinite ease-in-out;
    }

    /* Responsive adjustments */
    @media (min-width: 440px) {
      .app-container {
        border-radius: 40px;
        margin-top: 20px;
        margin-bottom: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        height: 800px;
        overflow-y: auto;
        border: 8px solid #333;
        /* Simulate phone frame */
        background: var(--bg);
      }

      .app-container::-webkit-scrollbar {
        width: 4px;
      }

      .app-container::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 2px;
      }

      .bottom-nav {
        position: absolute;
        bottom: 20px;
      }
    }
  </style>
</head>

<body>
  <!-- Animated Background Shapes -->
  <div class="bg-bubble"
    style="width: 200px; height: 200px; top: 10%; left: -50px; background: rgba(255, 107, 107, 0.1);"></div>
  <div class="bg-bubble"
    style="width: 300px; height: 300px; bottom: 5%; right: -100px; background: rgba(78, 205, 196, 0.1); animation-duration: 25s;">
  </div>
  <div class="bg-bubble"
    style="width: 150px; height: 150px; top: 40%; right: 10%; background: rgba(255, 230, 109, 0.2); animation-duration: 18s;">
  </div>

  <div class="app-container">
    <!-- Simple Company Header -->
    <header class="header" style="justify-content: center; gap: 12px;">
      <div
        style="width: 44px; height: 44px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);">
        <i class="fas fa-gamepad"></i>
      </div>
      <h1 style="font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--text);">KIDS<span
          style="color: var(--primary);">PLAY</span></h1>
    </header>



    <!-- Single Big Gallery (Dynamically Filled) -->
    <div class="games-grid"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="nav-item active">
        <i class="fas fa-home"></i>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-gamepad"></i>
        <span class="nav-label">Games</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-trophy"></i>
        <span class="nav-label">Ranks</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-store"></i>
        <span class="nav-label">Shop</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-user-circle"></i>
        <span class="nav-label">Profile</span>
      </div>
    </nav>
  </div>

  <script>
    // Game Player Logic
    function openGame(link, name) {
      window.location.href = `player.html?url=${encodeURIComponent(link)}&name=${encodeURIComponent(name)}`;
    }

    // Game Data
    const games = [
      {
        link: "https://games.cdn.famobi.com/html5games/z/zoo-boom/cd0be843/?fg_domain=play.famobi.com&fg_aid=A1000-1&fg_uid=5e772ebe-9e0a-4cd3-adcf-bba662f35535&fg_pid=4638e320-4444-4514-81c4-d80a8c662371&fg_beat=420&original_ref=",
        name: "Zoo Boom",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/ZooBoomTeaser.jpg?v=0.2-ecf77b68"
      },
      {
        link: "https://games.cdn.famobi.com/html5games/o/om-nom-run/v1240/?fg_domain=play.famobi.com&fg_aid=A1000-1&fg_uid=abe80572-560a-444d-baf7-2fa4a7b2c02f&fg_pid=4638e320-4444-4514-81c4-d80a8c662371&fg_beat=421&original_ref=",
        name: "Om Nom Run",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/OmNomRunTeaser.jpg?v=0.2-ecf77b68"
      },
      {
        link: "https://games.cdn.famobi.com/html5games/c/cannon-balls-3d/v230/?fg_domain=play.famobi.com&fg_aid=A1000-1&fg_uid=3ffa11c2-61da-4974-892b-473582253371&fg_pid=4638e320-4444-4514-81c4-d80a8c662371&fg_beat=421&original_ref=",
        name: "Cannon Balls 3D",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/CannonBalls3dTeaser.jpg?v=0.2-ecf77b68"
      },
      {
        link: "https://games.cdn.famobi.com/html5games/b/bubble-woods/v570/?fg_domain=play.famobi.com&fg_aid=A1000-111&fg_uid=53159388-d515-45e5-b65a-56d21c595405&fg_pid=e37ab3ce-88cd-4438-9b9c-a37df5d33736&fg_beat=417&original_ref=https%3A%2F%2Fplay.famobi.com%2Fhtml5game%2F53159388-d515-45e5-b65a-56d21c595405%2FA1000-11",
        name: "Bubble Woods",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/BubbleWoodsTeaser.jpg"
      },
      {
        link: "https://games.cdn.famobi.com/html5games/m/moto-x3m-pool-party/v080/?fg_domain=play.famobi.com&fg_aid=A1000-1&fg_uid=b2102250-eb51-4704-9cab-ff296491cc68&fg_pid=4638e320-4444-4514-81c4-d80a8c662371&fg_beat=421&original_ref=",
        name: "Moto X3M Pool Party",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/MotoX3mPoolPartyTeaser.jpg"
      }
      ,
      {
        link: "https://play.famobi.com/solitaire-klondike",
        name: "Solitaire",
        image: "https://img.cdn.famobi.com/portal/html5games/images/tmp/SolitaireKlondikeTeaser.jpg"
      }

    ];

    // Randomize UI and Order
    function randomizeUI() {
      const grid = document.querySelector('.games-grid');
      grid.innerHTML = ''; // Clear existing hardcoded cards

      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A29BFE', '#FAB1A0', '#55E6C1'];

      // Shuffle the data array
      const shuffledGames = [...games].sort(() => Math.random() - 0.5);

      shuffledGames.forEach((game, index) => {
        const card = document.createElement('div');
        card.className = 'game-card';

        // Random rotation for playful look
        const rotation = (Math.random() * 4 - 2).toFixed(1);
        card.style.transform = `rotate(${rotation}deg)`;

        card.innerHTML = `
          <div class="game-thumb" style="background: ${colors[index % colors.length]}">
            <img src="${game.image}" alt="${game.name}">
          </div>
          <div class="game-info-row">
            <h4>${game.name}</h4>
            <div class="play-button-large"><i class="fas fa-play"></i> PLAY</div>
          </div>
        `;

        card.addEventListener('click', () => {
          openGame(game.link, game.name);
        });

        grid.appendChild(card);
      });
    }

    // Simple Interactivity
    randomizeUI();
    document.querySelectorAll('.category-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelector('.category-chip.active').classList.remove('active');
        chip.classList.add('active');
        // Add a little feedback sound or vibration logic here if needed
      });
    });

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelector('.nav-item.active').classList.remove('active');
        item.classList.add('active');
      });
    });

    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        // Mock game launch
        const title = card.querySelector('h4').textContent;
        console.log(`Launching ${title}...`);
      });
    });







  </script>
</body>

</html>
